code_implement_user: |-
  With the following given information, write Python code using PyTorch to implement a Qlib A-share prediction-score model.
  The model must support one of the Qlib model input shapes declared by the task:
  - Tabular: feature tensor [batch_size, num_features].
  - TimeSeries: feature tensor [batch_size, num_timesteps, num_features].
  The model output must be a prediction score tensor with shape [batch_size, 1]. Qlib will save this score as the `score` column in `pred.pkl` indexed by `datetime` and `instrument`.
  Do not use relationship-edge inputs, cross-edge propagation, or geometric-learning library paths for Qlib A-share tasks.
  Implement the model forward function based on the following model formula information.
  1. model name:{{name}}
  2. model description:{{description}}
  3. model formulation:{{formulation}}
  4. model variables:{{variables}}.
  You must complete the forward function as far as you can do.
  Execution: your implemented code will be executed in the following way:
  The implemented code will be placed in a file like [uuid]/model.py
  We'll import the model in the implementation in file `model.py` after setting the cwd into the directory
  - from model import model_cls (So you must have a variable named `model_cls` in the file)
    - So your implemented code could follow the following pattern
      ```Python
      class XXXModel(torch.nn.Module):
          ...
      model_cls = XXXModel
      ```
  - initialize tabular models with `model_cls(num_features=NUM_FEATURES)`.
  - initialize time-series models with `model_cls(num_features=NUM_FEATURES, num_timesteps=NUM_TIMESTEPS)`.
  - verify the model by feeding the declared Qlib tensor shape and checking the returned prediction-score tensor.
